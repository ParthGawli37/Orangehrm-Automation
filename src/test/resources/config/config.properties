# ==========================================
# Application Configuration
# ==========================================

app.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# ==========================================
# Browser Configuration
# ==========================================

browser=chrome

# Supported Browsers:
# chrome
# firefox
# edge

headless=false

# ==========================================
# Login Credentials
# ==========================================

username=Admin
password=admin123

# ==========================================
# Timeout Configuration
# ==========================================

implicit.wait=0

explicit.wait=15

page.load.timeout=30

# Wait Polling Interval (milliseconds)
polling.interval.millis=500

# ==========================================
# Retry Configuration
# ==========================================

# Number of retries after initial failure
retry.count=1

# Wait between retries (seconds)
retry.wait.seconds=2

# Retry only failed actions
retry.only.on.failure=true

# Log retry attempts
retry.log.attempts=true

# Capture screenshot during retries
retry.capture.screenshot=true

# ==========================================
# Wait Behaviour
# ==========================================

wait.for.visibility=true

wait.for.clickable=true

wait.for.page.ready=true

wait.for.ajax.complete=true

# Maximum wait-retry cycles
max.wait.retry=3

# ==========================================
# Failure Conditions
# ==========================================

fail.if.element.not.visible=true

fail.if.element.not.clickable=true

fail.if.page.not.loaded=true

fail.if.ajax.not.complete=true

# ==========================================
# Stale Element Handling
# ==========================================

stale.element.retry.count=2

# ==========================================
# Reporting Configuration
# ==========================================

screenshot.on.pass=false

screenshot.on.fail=true

screenshot.on.retry=true

# ==========================================
# Execution Configuration
# ==========================================

# Critical = Production Blocker
# High     = Important
# Medium   = Normal
# Low      = Nice To Have

execution.priority=Low

# ==========================================
# Test Data Configuration
# ==========================================

testdata.file=OrangeHRM_QA_Testing_Workbook_120cases.xlsx

# ==========================================
# Framework Configuration
# ==========================================

framework.mode=excel

# Supported:
# excel
# cucumber

# ==========================================
# Future Cucumber Configuration
# ==========================================

feature.path=src/test/resources/features

stepdefinition.package=stepdefinitions